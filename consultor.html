<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultor de Sacolas — Art & Sacolas</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ============================================
       CONSULTOR — DARK MINIMAL (estilo ChatGPT)
       ============================================ */

    *, *::before, *::after { box-sizing: border-box; }

    body {
      background: #0f172a;
      color: #e8e8e8;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* BARRA DE PROGRESSO NO TOPO */
    .top-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.05);
      z-index: 200;
    }
    .top-bar-fill {
      height: 100%;
      background: #3D52C5;
      border-radius: 999px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    /* WRAPPER */
    .consultor-wrapper {
      width: 100%;
      max-width: 680px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* HEADER MINIMAL */
    .chat-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15,23,42,0.95);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-back {
      color: rgba(255,255,255,0.3);
      text-decoration: none;
      font-size: 1.2rem;
      line-height: 1;
      transition: color 0.15s;
      padding: 4px 2px;
    }
    .chat-back:hover { color: rgba(255,255,255,0.7); }

    .chat-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.01em;
    }

    .step-count {
      font-size: 0.8125rem;
      color: rgba(255,255,255,0.22);
      font-variant-numeric: tabular-nums;
    }

    /* ============================================
       TELA DE BOAS-VINDAS (estilo ChatGPT open)
       ============================================ */
    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 28px 32px;
      text-align: center;
    }

    .welcome-screen.hidden { display: none; }

    .welcome-icon {
      font-size: 2.75rem;
      margin-bottom: 28px;
      line-height: 1;
    }

    .welcome-title {
      font-size: clamp(1.5rem, 5vw, 2.125rem);
      font-weight: 700;
      color: #f0f0f0;
      line-height: 1.3;
      letter-spacing: -0.025em;
      margin-bottom: 14px;
      max-width: 440px;
    }

    .welcome-subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.38);
      line-height: 1.65;
      max-width: 380px;
      margin-bottom: 36px;
    }

    .welcome-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 36px;
    }

    .welcome-chip {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 6px 14px;
    }

    .welcome-cta {
      background: #3D52C5;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px 44px;
      font-size: 1rem;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
      letter-spacing: 0.01em;
      line-height: 1;
    }
    .welcome-cta:hover {
      background: #2F3C8F;
      transform: translateY(-1px);
    }

    .welcome-note {
      margin-top: 16px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.18);
    }

    /* ============================================
       CHAT VIEW
       ============================================ */
    .chat-view {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-view.active { display: flex; }

    /* ÁREA DO CHAT */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px 16px;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 3px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.09);
      border-radius: 2px;
    }

    .date-chip {
      text-align: center;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.13);
      margin-bottom: 24px;
    }

    /* MENSAGENS */
    .message {
      max-width: 88%;
      font-size: 0.9375rem;
      line-height: 1.65;
      animation: msgIn 0.3s cubic-bezier(.4,0,.2,1);
      word-break: break-word;
      margin-bottom: 6px;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Bot: texto simples, sem bolha */
    .message.bot {
      color: #dcdcdc;
      background: transparent;
      align-self: flex-start;
      padding: 0;
      margin-bottom: 14px;
    }

    /* Usuário: bolha discreta à direita */
    .message.user {
      background: #1e2a3a;
      color: #e8e8e8;
      border-radius: 18px 18px 4px 18px;
      padding: 10px 16px;
      align-self: flex-end;
      font-size: 0.9rem;
      border: 1px solid rgba(61,82,197,0.15);
      margin-bottom: 20px;
      margin-top: 2px;
    }

    /* Dica: borda laranja sutil */
    .message.tip {
      background: rgba(61,82,197,0.06);
      border-left: 2px solid rgba(61,82,197,0.45);
      border-radius: 4px;
      padding: 10px 14px;
      color: rgba(255,255,255,0.52);
      font-size: 0.875rem;
      align-self: flex-start;
      max-width: 92%;
      margin-bottom: 12px;
    }

    /* TYPING */
    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 4px 0 8px;
      width: fit-content;
      align-self: flex-start;
      animation: msgIn 0.2s ease;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      background: rgba(255,255,255,0.18);
      border-radius: 50%;
      animation: typingBounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%,80%,100% { transform: translateY(0); opacity: 0.3; }
      40%          { transform: translateY(-5px); opacity: 1; }
    }

    /* CARD DE RECOMENDAÇÃO */
    .message.rec-wrap {
      max-width: 100%;
      padding: 0;
      background: transparent;
      align-self: flex-start;
      width: 100%;
      margin-bottom: 14px;
    }

    .rec-card {
      background: #1a2437;
      border: 1px solid rgba(61,82,197,0.2);
      border-radius: 16px;
      overflow: hidden;
    }

    .rec-top {
      padding: 16px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .rec-badge {
      font-size: 0.6875rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #3D52C5;
      margin-bottom: 4px;
    }

    .rec-title {
      font-size: 1.125rem;
      font-weight: 700;
      color: #f0f0f0;
    }

    .rec-desc {
      padding: 14px 20px;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.45);
      line-height: 1.65;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .rec-specs {
      padding: 14px 20px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .spec-row {
      display: flex;
      gap: 10px;
      font-size: 0.8125rem;
    }

    .spec-key {
      color: rgba(255,255,255,0.28);
      min-width: 88px;
      flex-shrink: 0;
    }

    .spec-val {
      color: rgba(255,255,255,0.8);
      font-weight: 500;
    }

    .rec-prazo {
      padding: 12px 20px;
      font-size: 0.8125rem;
      color: rgba(61,82,197,0.85);
      background: rgba(61,82,197,0.05);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ÁREA DE OPÇÕES (fundo) */
    .options-area {
      background: #111827;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 10px 16px 18px;
      flex-shrink: 0;
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .options-area {
        padding-bottom: calc(18px + env(safe-area-inset-bottom));
      }
    }

    .opts-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    /* BOTÕES DE OPÇÃO */
    .opt-btn {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.025);
      cursor: pointer;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.65);
      text-align: left;
      transition: all 0.15s ease;
      font-family: var(--font);
      width: 100%;
      line-height: 1.4;
    }

    .opt-btn:hover, .opt-btn:active {
      border-color: rgba(61,82,197,0.5);
      background: rgba(61,82,197,0.06);
      color: #f0f0f0;
    }

    /* ÁREA DE AÇÃO (final) */
    .action-area {
      background: #111827;
      border-top: 1px solid rgba(255,255,255,0.07);
      padding: 10px 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-wa-final {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #25D366;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
      line-height: 1;
    }
    .btn-wa-final:hover { background: #1ebe5a; }

    .btn-restart {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: transparent;
      color: rgba(255,255,255,0.28);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 11px;
      font-size: 0.875rem;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-restart:hover {
      border-color: rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.04);
    }
  </style>
</head>
<body>

  <!-- BARRA DE PROGRESSO TOPO -->
  <div class="top-bar">
    <div class="top-bar-fill" id="top-bar-fill"></div>
  </div>

  <div class="consultor-wrapper">

    <!-- HEADER MINIMAL -->
    <div class="chat-header">
      <div class="chat-header-left">
        <a href="index.html" class="chat-back" title="Voltar">←</a>
        <span class="chat-name">Art &amp; Sacolas</span>
      </div>
      <span class="step-count" id="step-count"></span>
    </div>

    <!-- TELA DE BOAS-VINDAS -->
    <div class="welcome-screen" id="welcome-screen">
      <div class="welcome-icon">🎒</div>
      <h1 class="welcome-title">Qual sacola é ideal para o seu negócio?</h1>
      <p class="welcome-subtitle">Responda 9 perguntas rápidas e receba uma recomendação personalizada com resumo completo para o WhatsApp.</p>
      <div class="welcome-chips">
        <span class="welcome-chip">⚡ 3 minutos</span>
        <span class="welcome-chip">🎯 Recomendação personalizada</span>
        <span class="welcome-chip">💬 Resumo para WhatsApp</span>
      </div>
      <button class="welcome-cta" onclick="iniciarConsultor()">Começar →</button>
      <p class="welcome-note">Sem cadastro. Sem compromisso.</p>
    </div>

    <!-- CHAT VIEW -->
    <div class="chat-view" id="chat-view">
      <div class="chat-area" id="chat-area">
        <div class="date-chip">Hoje</div>
      </div>
      <div class="options-area" id="options-area"></div>
    </div>

  </div>

  <script>
  // =================================================
  //   CONSULTOR CONVERSACIONAL — Art & Sacolas
  // =================================================

  const WHATSAPP_NUM = '5544998470757';

  const PERGUNTAS = [
    {
      id: 'negocio',
      texto: 'Que tipo de negócio você tem?',
      opcoes: [
        { label: '👗  Moda e vestuário', val: 'moda' },
        { label: '👢  Calçados e bolsas', val: 'calcados' },
        { label: '💄  Beleza, cosméticos e perfumaria', val: 'beleza' },
        { label: '💊  Farmácia ou produtos de saúde', val: 'farmacia' },
        { label: '💍  Joias, ótica ou presentes', val: 'presentes' },
        { label: '🍕  Alimentação ou delivery', val: 'alimentacao' },
        { label: '📚  Papelaria, livraria ou bazar', val: 'papelaria' },
        { label: '🏪  Outro tipo de comércio varejista', val: 'outro' }
      ]
    },
    {
      id: 'produto',
      texto: 'Como são os produtos que você costuma vender?',
      dica: '💡 Isso define a <strong>gramatura</strong> ideal da sacola. <em>Gramatura</em> é a espessura e resistência do papel — quanto mais pesado o produto, mais grossa precisa ser a sacola.',
      opcoes: [
        { label: '🪶  Leves — roupas dobradas, acessórios, cosméticos', val: 'leve' },
        { label: '📦  Médios — calçados em caixa, livros, presentes embalados', val: 'medio' },
        { label: '🏋️  Pesados ou em grande volume', val: 'pesado' }
      ]
    },
    {
      id: 'posicionamento',
      texto: 'Como você descreveria o perfil da sua loja?',
      opcoes: [
        { label: '💰  Popular e acessível — foco no menor preço', val: 'popular' },
        { label: '⚖️  Intermediária — equilíbrio entre qualidade e preço', val: 'intermediario' },
        { label: '✨  Premium e sofisticada — experiência do cliente em primeiro lugar', val: 'premium' }
      ]
    },
    {
      id: 'estetica',
      texto: 'Qual estilo visual combina com a identidade da sua loja?',
      opcoes: [
        { label: '🎯  Moderno e clean', val: 'moderno' },
        { label: '👑  Elegante e clássico', val: 'elegante' },
        { label: '🌿  Rústico, artesanal ou natural', val: 'rustico' },
        { label: '🔧  Simples e funcional', val: 'simples' }
      ]
    },
    {
      id: 'prioridade',
      texto: 'Na hora de escolher a sacola, o que é mais importante para você?',
      opcoes: [
        { label: '💪  Resistência — não pode rasgar com o peso do produto', val: 'resistencia' },
        { label: '😍  Visual bonito — precisa impressionar o cliente', val: 'visual' },
        { label: '🌱  Sustentabilidade — prefiro material ecológico', val: 'sustentavel' },
        { label: '💵  Menor custo por unidade', val: 'preco' }
      ]
    },
    {
      id: 'cores',
      texto: 'A identidade visual da sua loja tem quantas cores?',
      dica: '💡 O número de cores afeta o custo de impressão. Uma cor sai mais barato — cada cor adicional tem um pequeno acréscimo.',
      opcoes: [
        { label: '1️⃣  Uma cor', val: '1' },
        { label: '2️⃣  Duas cores', val: '2' },
        { label: '🎨  Três ou mais cores', val: '3+' },
        { label: '❓  Ainda não sei ou estou criando', val: 'nao_sei' }
      ]
    },
    {
      id: 'quantidade',
      texto: 'Quantas sacolas você vai precisar?',
      dica: '💡 O pedido mínimo é de <strong>250 unidades</strong>. Quanto maior a quantidade, melhor o preço por unidade.',
      opcoes: [
        { label: '📦  250 unidades — vou começar testando', val: 250 },
        { label: '📦📦  500 unidades — volume regular do mês', val: 500 },
        { label: '📦📦📦  1.000 unidades ou mais', val: 1000 }
      ]
    },
    {
      id: 'logo',
      texto: 'Você já tem uma logo ou identidade visual criada?',
      opcoes: [
        { label: '✅  Sim, tenho logo pronta para enviar', val: 'tem' },
        { label: '✏️  Tenho só o nome da loja, sem logo ainda', val: 'nome' },
        { label: '🎨  Ainda estou criando minha identidade visual', val: 'criando' }
      ]
    },
    {
      id: 'prazo',
      texto: 'Você tem algum prazo em mente para receber as sacolas?',
      opcoes: [
        { label: '🔥  Urgente — tenho inauguração ou evento próximo', val: 'urgente' },
        { label: '📅  Tranquilo — posso esperar 20 a 30 dias úteis', val: 'tranquilo' },
        { label: '🔍  Ainda estou pesquisando, sem data definida', val: 'pesquisando' }
      ]
    }
  ];

  const RECOMENDACOES = {
    camiseta: {
      nome: 'Alça Camiseta',
      emoji: '👗',
      cor: '#5B9BD5',
      descricao: 'A mais vendida e versátil do mercado. Resistente, prática e com excelente custo-benefício — perfeita para o comércio do dia a dia.',
      motivo: 'Com base no perfil do seu negócio e nos produtos que você vende, a sacola camiseta é a escolha mais acertada: resistente para o peso dos produtos, econômica para o volume que você precisa e reconhecida pelo seu público.',
      gramatura: '100g/m² a 130g/m²',
      impressao: 'Flexográfica em até 4 cores',
      tamanhos: 'P (30×40cm) · M (45×60cm) · G (60×80cm)'
    },
    vazada: {
      nome: 'Alça Vazada',
      emoji: '🏪',
      cor: '#34A85A',
      descricao: 'Econômica, resistente e extremamente prática. Campeã em volume e custo por unidade.',
      motivo: 'Você priorizou custo-benefício e praticidade — a sacola vazada entrega exatamente isso. É a mais econômica por unidade, resistente para o uso diário e ideal para lojas com alto fluxo de clientes.',
      gramatura: '80g/m² a 100g/m²',
      impressao: 'Flexográfica em 1 a 2 cores',
      tamanhos: 'P (20×30cm) · M (30×40cm) · G (40×50cm)'
    },
    fita: {
      nome: 'Alça Fita',
      emoji: '✨',
      cor: '#9D6FE8',
      descricao: 'Sofisticada e elegante. Transmite cuidado, qualidade e diferenciação — eleva a percepção de valor da sua marca.',
      motivo: 'Seu negócio tem um posicionamento que pede requinte. A sacola fita transmite cuidado e sofisticação — cada cliente que sair da sua loja com ela vai perceber o nível da sua marca.',
      gramatura: '150g/m² a 200g/m²',
      impressao: 'Offset ou hot stamping',
      tamanhos: 'P (27×40cm) · M (30×45cm) · G (40×50cm)'
    },
    kraft: {
      nome: 'Papel Kraft',
      emoji: '🌿',
      cor: '#C8A96E',
      descricao: 'Sustentável, natural e com apelo premium. Conecta sua marca a valores de autenticidade e consciência ambiental.',
      motivo: 'O perfil da sua loja tem uma identidade forte — natural, autêntica ou sustentável. A sacola kraft reforça exatamente esses valores e ainda passa uma imagem de empresa responsável e consciente.',
      gramatura: '120g/m² a 150g/m²',
      impressao: 'Flexográfica, natural ou hot stamping',
      tamanhos: 'P (18×30cm) · M (22×30cm) · G (32×40cm)'
    }
  };

  // =================================================
  //   ESTADO
  // =================================================

  let qi = -1;
  const R = {};

  // =================================================
  //   TRANSIÇÃO WELCOME → CHAT
  // =================================================

  function iniciarConsultor() {
    document.getElementById('welcome-screen').classList.add('hidden');
    const chatView = document.getElementById('chat-view');
    chatView.classList.add('active');
    proximaPergunta();
  }

  // =================================================
  //   MOTOR DA CONVERSA
  // =================================================

  function proximaPergunta() {
    qi++;

    if (qi >= PERGUNTAS.length) {
      gerarRecomendacao();
      return;
    }

    const p = PERGUNTAS[qi];
    const pct = Math.round((qi / PERGUNTAS.length) * 100);
    atualizarProgresso(pct, qi);

    limparOpcoes();

    showTyping(900).then(() => {
      addBot(p.texto);

      if (p.dica) {
        setTimeout(() => {
          addDica(p.dica);
          setTimeout(() => renderOpcoes(p.opcoes), 450);
        }, 300);
      } else {
        setTimeout(() => renderOpcoes(p.opcoes), 300);
      }
    });
  }

  function escolher(val, label) {
    limparOpcoes();

    const limpo = label.replace(/^[^\w\dÀ-ú\d]+\s*/, '').trim();
    addUser(limpo);

    R[PERGUNTAS[qi].id] = val;

    setTimeout(() => proximaPergunta(), 700);
  }

  // =================================================
  //   RECOMENDAÇÃO
  // =================================================

  function calcularScore() {
    const s = { camiseta: 0, vazada: 0, fita: 0, kraft: 0 };

    const negScores = {
      moda:        [4, 0, 0, 0],
      calcados:    [4, 0, 0, 0],
      beleza:      [0, 0, 2, 3],
      farmacia:    [0, 4, 0, 0],
      presentes:   [0, 0, 4, 1],
      alimentacao: [2, 0, 0, 3],
      papelaria:   [1, 3, 0, 0],
      outro:       [2, 1, 0, 0]
    };
    const keys = ['camiseta', 'vazada', 'fita', 'kraft'];
    (negScores[R.negocio] || [1,1,1,1]).forEach((v, i) => s[keys[i]] += v);

    if (R.produto === 'pesado') { s.camiseta += 3; s.vazada += 1; }
    if (R.produto === 'medio')  { s.camiseta += 2; }
    if (R.produto === 'leve')   { s.fita += 1; s.kraft += 1; }

    if (R.posicionamento === 'premium')       { s.fita += 3; s.kraft += 2; }
    if (R.posicionamento === 'popular')       { s.vazada += 3; s.camiseta += 1; }
    if (R.posicionamento === 'intermediario') { s.camiseta += 2; }

    if (R.estetica === 'elegante') s.fita += 3;
    if (R.estetica === 'rustico')  s.kraft += 4;
    if (R.estetica === 'simples')  { s.vazada += 2; s.camiseta += 1; }
    if (R.estetica === 'moderno')  { s.camiseta += 1; s.fita += 1; }

    if (R.prioridade === 'resistencia') { s.camiseta += 3; s.vazada += 1; }
    if (R.prioridade === 'visual')      { s.fita += 2; s.kraft += 1; }
    if (R.prioridade === 'sustentavel') s.kraft += 5;
    if (R.prioridade === 'preco')       s.vazada += 4;

    return keys.reduce((a, b) => s[a] >= s[b] ? a : b);
  }

  function gerarRecomendacao() {
    atualizarProgresso(100, PERGUNTAS.length);
    limparOpcoes();

    showTyping(900).then(() => {
      addBot('Perfeito! Analisando o perfil do seu negócio...');

      setTimeout(() => {
        showTyping(1300).then(() => {
          const tipo = calcularScore();
          const rec  = RECOMENDACOES[tipo];

          addBot(`Encontrei a sacola ideal para você: <strong>${rec.nome} ${rec.emoji}</strong>`);

          setTimeout(() => {
            addBot(rec.motivo);
            setTimeout(() => {
              addCardRecomendacao(tipo, rec);
              mostrarAreaAcao(tipo, rec);
            }, 700);
          }, 600);
        });
      }, 800);
    });
  }

  function addCardRecomendacao(tipo, rec) {
    const prazoTxt = R.prazo === 'urgente'
      ? '⚠️ 10 a 12 dias úteis — informe urgência ao vendedor'
      : '15 a 20 dias úteis após aprovação da arte';

    const logoTxt = {
      tem:     'Logo pronta para enviar',
      nome:    'Sem logo — equipe monta a arte com o nome',
      criando: 'Em criação — equipe pode ajudar com a arte'
    }[R.logo] || '';

    const coresTxt = { '1':'1 cor', '2':'2 cores', '3+':'3 ou mais cores', 'nao_sei':'A definir' }[R.cores] || '';

    const div = document.createElement('div');
    div.className = 'message rec-wrap';
    div.innerHTML = `
      <div class="rec-card">
        <div class="rec-top" style="border-top: 3px solid ${rec.cor}">
          <div class="rec-badge">✅ Recomendação personalizada</div>
          <div class="rec-title">${rec.nome} ${rec.emoji}</div>
        </div>
        <div class="rec-desc">${rec.descricao}</div>
        <div class="rec-specs">
          <div class="spec-row">
            <span class="spec-key">Gramatura</span>
            <span class="spec-val">${rec.gramatura}</span>
          </div>
          <div class="spec-row">
            <span class="spec-key">Impressão</span>
            <span class="spec-val">${rec.impressao}</span>
          </div>
          <div class="spec-row">
            <span class="spec-key">Tamanhos</span>
            <span class="spec-val">${rec.tamanhos}</span>
          </div>
          <div class="spec-row">
            <span class="spec-key">Quantidade</span>
            <span class="spec-val">${R.quantidade} unidades</span>
          </div>
          ${coresTxt ? `<div class="spec-row">
            <span class="spec-key">Cores na arte</span>
            <span class="spec-val">${coresTxt}</span>
          </div>` : ''}
          ${logoTxt ? `<div class="spec-row">
            <span class="spec-key">Arte / Logo</span>
            <span class="spec-val">${logoTxt}</span>
          </div>` : ''}
        </div>
        <div class="rec-prazo">🗓️ Prazo médio: ${prazoTxt}</div>
      </div>
    `;

    const chat = document.getElementById('chat-area');
    chat.appendChild(div);
    rolarChat();
  }

  function mostrarAreaAcao(tipo, rec) {
    const waLink = buildWALink(tipo, rec);
    const area   = document.getElementById('options-area');
    area.className = 'action-area';
    area.innerHTML = `
      <a href="${waLink}" target="_blank" class="btn-wa-final">
        💬 Quero esse orçamento no WhatsApp
      </a>
      <button class="btn-restart" onclick="reiniciar()">↺ Refazer a consulta</button>
    `;
    rolarChat();
  }

  function buildWALink(tipo, rec) {
    const NEG = {
      moda:'Moda e vestuário', calcados:'Calçados e bolsas',
      beleza:'Beleza e cosméticos', farmacia:'Farmácia / Saúde',
      presentes:'Joias / Ótica / Presentes', alimentacao:'Alimentação / Delivery',
      papelaria:'Papelaria / Livraria', outro:'Outro comércio'
    };
    const PROD  = { leve:'Leves (roupas, cosméticos)', medio:'Médios (calçados, caixas)', pesado:'Pesados ou grandes volumes' };
    const POS   = { popular:'Popular e acessível', intermediario:'Intermediária', premium:'Premium e sofisticada' };
    const EST   = { moderno:'Moderno e clean', elegante:'Elegante e clássico', rustico:'Rústico / artesanal', simples:'Simples e funcional' };
    const PRI   = { resistencia:'Resistência', visual:'Visual bonito', sustentavel:'Sustentabilidade', preco:'Menor custo' };
    const CORES = { '1':'1 cor', '2':'2 cores', '3+':'3 ou mais cores', 'nao_sei':'A definir' };
    const LOGO  = { tem:'Logo pronta para enviar', nome:'Só o nome da loja', criando:'Ainda criando identidade' };
    const PRAZO = { urgente:'URGENTE — inauguração ou evento próximo', tranquilo:'Sem pressa (20–30 dias)', pesquisando:'Ainda pesquisando' };

    const linhas = [
      'Olá! Usei o consultor digital da Art & Sacolas e recebi uma recomendação. Gostaria de um orçamento:',
      '',
      `🏪 *Tipo de negócio:* ${NEG[R.negocio] || R.negocio}`,
      `📦 *Tipo de produto:* ${PROD[R.produto] || R.produto}`,
      `🎯 *Perfil da loja:* ${POS[R.posicionamento] || R.posicionamento}`,
      `🎨 *Estilo visual:* ${EST[R.estetica] || R.estetica}`,
      `⭐ *Prioridade:* ${PRI[R.prioridade] || R.prioridade}`,
      `🖌️ *Cores na arte:* ${CORES[R.cores] || R.cores}`,
      `🔢 *Quantidade:* ${R.quantidade} unidades`,
      `🖼️ *Logo / Arte:* ${LOGO[R.logo] || R.logo}`,
      `⏱️ *Prazo:* ${PRAZO[R.prazo] || R.prazo}`,
      '',
      `✅ *Sacola recomendada:* ${rec.nome}`,
      `📐 *Gramatura indicada:* ${rec.gramatura}`,
      '',
      'Pode confirmar o orçamento e me informar os próximos passos?'
    ];

    return 'https://wa.me/' + WHATSAPP_NUM + '?text=' + encodeURIComponent(linhas.join('\n'));
  }

  function reiniciar() {
    qi = -1;
    Object.keys(R).forEach(k => delete R[k]);

    document.getElementById('chat-view').classList.remove('active');

    const welcome = document.getElementById('welcome-screen');
    welcome.classList.remove('hidden');

    document.getElementById('chat-area').innerHTML = '<div class="date-chip">Hoje</div>';
    document.getElementById('options-area').className = 'options-area';
    document.getElementById('options-area').innerHTML = '';

    atualizarProgresso(0, 0);
  }

  // =================================================
  //   HELPERS DE UI
  // =================================================

  function showTyping(ms = 900) {
    return new Promise(resolve => {
      const el = document.createElement('div');
      el.className = 'typing-indicator';
      el.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';

      const chat = document.getElementById('chat-area');
      chat.appendChild(el);
      rolarChat();

      setTimeout(() => { el.remove(); resolve(); }, ms);
    });
  }

  function addBot(html) {
    const el = document.createElement('div');
    el.className = 'message bot';
    el.innerHTML = html;
    document.getElementById('chat-area').appendChild(el);
    rolarChat();
  }

  function addDica(html) {
    const el = document.createElement('div');
    el.className = 'message tip';
    el.innerHTML = html;
    document.getElementById('chat-area').appendChild(el);
    rolarChat();
  }

  function addUser(texto) {
    const el = document.createElement('div');
    el.className = 'message user';
    el.textContent = texto;
    document.getElementById('chat-area').appendChild(el);
    rolarChat();
  }

  function renderOpcoes(opcoes) {
    const area = document.getElementById('options-area');
    area.className = 'options-area';
    const grid = document.createElement('div');
    grid.className = 'opts-grid';

    opcoes.forEach(o => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = o.label;
      btn.onclick = () => escolher(o.val, o.label);
      grid.appendChild(btn);
    });

    area.innerHTML = '';
    area.appendChild(grid);
  }

  function limparOpcoes() {
    document.getElementById('options-area').innerHTML = '';
  }

  function rolarChat() {
    const chat = document.getElementById('chat-area');
    setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 60);
  }

  function atualizarProgresso(pct, atual) {
    document.getElementById('top-bar-fill').style.width = pct + '%';
    const el = document.getElementById('step-count');
    el.textContent = atual > 0 ? atual + ' / ' + PERGUNTAS.length : '';
  }
  </script>

</body>
